<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flappy Nails — Janne sans e</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'BrasikaDisplay';
      src: url('fonts/BrasikaDisplay.otf') format('opentype');
      font-weight: normal; font-style: normal;
    }
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    :root {
      --bx: #9B1F37; --bxd: #5C1526; --bxdd: #2D0A1A;
      --pink: #FECBD2; --cream: #FFFAFC; --border: #EBC0C8;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #18040e; font-family: 'Poppins', sans-serif; }
    #wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #gc { position: relative; width: 390px; height: 660px; }
    @media (max-width: 430px) { #gc { width: 100vw; height: 100dvh; } }
    @media (max-height: 680px) and (min-width: 431px) { #gc { width: 360px; height: 580px; } }
    canvas { display: block; width: 100%; height: 100%; }

    /* ── SCREENS ── */
    .scr {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      background: rgba(255,250,252,0.92);
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
      overflow-y: auto;
      border: 3px solid var(--bx);
      outline: 2px solid var(--cream);
      outline-offset: -6px;
    }
    .scr::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(155,31,55,0.03) 3px,rgba(155,31,55,0.03) 4px);
    }
    .scr.on { opacity: 1; pointer-events: all; }

    /* ── TITLE — brand display font ── */
    .ttl {
      font-family: 'BrasikaDisplay', 'Poppins', sans-serif;
      font-size: 40px; color: var(--bx); line-height: 1.1;
      text-align: center; letter-spacing: -0.5px;
      text-shadow: 3px 3px 0 rgba(92,21,38,0.25);
    }
    .sub { font-size: 12px; color: #9a5060; font-weight: 600; margin-top: 8px; text-align: center; max-width: 280px; }
    .section-label { font-family: 'BrasikaDisplay', 'Poppins', sans-serif; font-size: 11px; font-weight: 800; color: var(--bxd); text-transform: uppercase; letter-spacing: 2px; text-align: center; }

    /* ── BUTTONS ── */
    .btn {
      width: 100%; max-width: 300px; min-height: 50px; padding: 14px 24px;
      border: 2px solid var(--bxd); border-radius: 26px;
      font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; position: relative;
      transition: transform 0.08s, box-shadow 0.08s, opacity .15s;
    }
    .btn:active { transform: translate(3px, 3px); box-shadow: none !important; }
    .btn-p { background: var(--bx); color: var(--cream); box-shadow: 3px 3px 0 var(--bxd); }
    .btn-p:hover { background: var(--bxd); }
    .btn-p:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
    .btn-s { background: var(--pink); color: var(--bx); box-shadow: 3px 3px 0 var(--border); border-color: var(--border); }
    .btn-g { background: transparent; color: var(--bx); font-size: 12px; font-weight: 600; text-decoration: underline; box-shadow: none; border: none; padding: 8px; min-height: auto; }

    /* ── CARD ── */
    .card { background: var(--cream); border: 2px solid var(--border); border-radius: 16px; padding: 16px 18px; width: 100%; max-width: 320px; box-shadow: 3px 3px 0 var(--border); }

    /* ── FORM ── */
    .flabel { display: block; font-size: 10px; font-weight: 700; color: var(--bxd); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .finput { width: 100%; min-height: 48px; padding: 12px 16px; border: 2px solid var(--border); border-radius: 24px; font-family: 'Poppins', sans-serif; font-size: 15px; color: #333; background: var(--cream); outline: none; transition: border-color .18s; box-shadow: 2px 2px 0 var(--border); }
    .finput:focus { border-color: var(--bx); }
    .fgroup { margin-bottom: 14px; width: 100%; max-width: 320px; }
    .ferr { font-size: 11px; color: #d32f2f; margin-top: 4px; display: none; }
    .cbrow { display: flex; align-items: flex-start; gap: 10px; width: 100%; max-width: 320px; margin-bottom: 18px; }
    .cbrow input[type="checkbox"] { width: 20px; height: 20px; min-width: 20px; accent-color: var(--bx); margin-top: 2px; cursor: pointer; }
    .cbrow label { font-size: 12px; color: #666; line-height: 1.4; cursor: pointer; }

    .rule { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #555; margin-bottom: 8px; }
    .rule .ic { font-size: 16px; min-width: 24px; text-align: center; }

    .progress-wrap { display:flex; align-items:center; gap:8px; }
    .g4{height:4px} .g8{height:8px} .g12{height:12px} .g16{height:16px} .g20{height:20px} .g24{height:24px}

    /* ── BOXES ── */
    .boxes { display: flex; gap: 14px; width: 100%; max-width: 320px; justify-content: center; }
    .giftbox { flex: 1; max-width: 96px; aspect-ratio: 1/1; background: var(--bx); border: 3px solid var(--bxd); border-radius: 14px; box-shadow: 3px 3px 0 var(--border); cursor: pointer; position: relative; display:flex; align-items:center; justify-content:center; transition: transform .12s; }
    .giftbox:active { transform: scale(0.94); }
    .giftbox::before { content:''; position:absolute; top:0; bottom:0; left:50%; width:14px; margin-left:-7px; background: var(--pink); }
    .giftbox::after { content:''; position:absolute; left:0; right:0; top:50%; height:14px; margin-top:-7px; background: var(--pink); }
    .giftbox .ribbon-bow { position:absolute; top:-13px; left:50%; transform:translateX(-50%); font-size:22px; }
    .giftbox.chosen { animation: shake .4s ease; }
    @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }
    .giftbox.disabled { pointer-events:none; opacity:.5; }

    /* ── REVEAL ── */
    .reveal-prize { font-family:'BrasikaDisplay','Poppins',sans-serif; font-size:46px; color: var(--bx); text-align:center; }
    .confetti { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
    .confetti span { position:absolute; top:-12px; border-radius:2px; opacity:0; animation: fall 1.8s ease-in forwards; }
    @keyframes fall { 0%{opacity:1; transform:translateY(0) rotate(0)} 100%{opacity:0; transform:translateY(640px) rotate(420deg)} }
  </style>
</head>
<body>
<div id="wrap">
 <div id="gc">
  <canvas id="c"></canvas>

  <!-- INTRO -->
  <div id="s-intro" class="scr on" style="justify-content:flex-start;padding-top:56px;">
    <div class="ttl">Jeu 100% Gagnant</div>
    <div class="sub">Janne_sans_e - Nail Art - Marseille</div>
    <div class="g20"></div>
    <div class="card">
      <div class="rule"><span class="ic">🎁</span><span>Passe 10 tuyaux et gagne ton cadeau !</span></div>
    </div>
    <div class="g24"></div>
    <button class="btn btn-p" onclick="startGame()">Jouer</button>
  </div>

  <!-- GAME OVER (avant 10 tuyaux) -->
  <div id="s-go" class="scr">
    <div style="font-family:'BrasikaDisplay',sans-serif;font-size:36px;color:var(--bx);text-align:center;line-height:1.1;">Aïe ! 💔</div>
    <div class="g8"></div>
    <div class="sub" id="go-progress"></div>
    <div class="g24"></div>
    <button class="btn btn-p" onclick="startGame()">Réessayer</button>
  </div>

  <!-- VICTORY + FORM -->
  <div id="s-victory" class="scr">
    <div style="font-size:48px;">🎉</div>
    <div class="g8"></div>
    <div style="font-family:'BrasikaDisplay',sans-serif;font-size:30px;color:var(--bx);text-align:center;">Bravo tu as gagné !</div>
    <div class="sub">Rentre ton mail pour recevoir ton lot !</div>
    <div class="g20"></div>
    <div class="fgroup">
      <label class="flabel">Ton email</label>
      <input id="inp-em" type="email" class="finput" placeholder="mail@gmail.com" oninput="checkEmailValid()">
      <div id="err-em" class="ferr"></div>
    </div>
    <div class="cbrow">
      <input type="checkbox" id="inp-opt">
      <label for="inp-opt">Je veux être parmi les premier·es au courant des inspis, concours, promos et nouveautés !</label>
    </div>
    <button class="btn btn-p" id="btn-victory" onclick="goToBoxes()" disabled>Découvrir mon lot</button>
  </div>

  <!-- GIFT BOXES -->
  <div id="s-boxes" class="scr">
    <div style="font-family:'BrasikaDisplay',sans-serif;font-size:28px;color:var(--bx);text-align:center;">Choisis ta boîte</div>
    <div class="g24"></div>
    <div class="boxes">
      <div class="giftbox" onclick="chooseBox(this)"><span class="ribbon-bow">🎀</span></div>
      <div class="giftbox" onclick="chooseBox(this)"><span class="ribbon-bow">🎀</span></div>
    </div>
  </div>

  <!-- REVEAL -->
  <div id="s-reveal" class="scr">
    <div class="confetti" id="confetti-wrap"></div>
    <div class="section-label">Ton lot</div>
    <div class="g8"></div>
    <div class="reveal-prize" id="reveal-prize">-10€</div>
    <div class="g16"></div>
    <div class="sub">Ton code te sera envoyé par email d'ici quelques minutes ✦</div>
    <div class="g24"></div>
    <button class="btn btn-p" onclick="finishGame()">Terminer</button>
  </div>

 </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — AIRTABLE
// ═══════════════════════════════════════════════════
const AIRTABLE_BASE = 'appfVEFGxSUZ8mQM2';
const AIRTABLE_TABLE = 'tblPuhclSJ6En0PlI';
const AIRTABLE_KEY = 'patPWTNR3wLCWjkbg.5a540f05cbf906b0ca58aa2ea35b4999cc20b5afaa360d8a130361aa5c5abaf5';
const AIRTABLE_ENDPOINT = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${AIRTABLE_TABLE}`;

const WIN_PIPES = 10;
let lastTime=0, audioCtx=null;
let currentEmail='', currentOptin=false, currentLot='';

const SCREENS=['s-intro','s-go','s-victory','s-boxes','s-reveal'];
function show(id) { SCREENS.forEach(s=>{const el=document.getElementById(s);if(el)el.classList.remove('on');}); if(id){const el=document.getElementById(id);if(el)el.classList.add('on');} }

function checkEmailValid(){
  const em=document.getElementById('inp-em').value.trim();
  const ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em);
  document.getElementById('btn-victory').disabled=!ok;
  return ok;
}

function goToBoxes(){
  const em=document.getElementById('inp-em').value.trim();
  document.getElementById('err-em').style.display='none';
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){
    document.getElementById('err-em').textContent='Email invalide';
    document.getElementById('err-em').style.display='block';
    return;
  }
  currentEmail=em;
  currentOptin=document.getElementById('inp-opt').checked;
  show('s-boxes');
}

function chooseBox(el){
  document.querySelectorAll('.giftbox').forEach(b=>b.classList.add('disabled'));
  el.classList.add('chosen');
  currentLot = Math.random()<0.5 ? '-10€' : '-15%';
  sendToAirtable(currentEmail, currentOptin, currentLot);
  setTimeout(()=>{ openReveal(); }, 500);
}

async function sendToAirtable(email, optin, lot){
  try{
    await fetch(AIRTABLE_ENDPOINT, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ fields: { email, optin, lot } })
    });
  }catch(e){
    console.error('Airtable error:', e);
  }
}

function openReveal(){
  document.getElementById('reveal-prize').textContent=currentLot;
  show('s-reveal');
  fireConfetti();
}

function fireConfetti(){
  const wrap=document.getElementById('confetti-wrap');
  wrap.innerHTML='';
  const cols=['#9B1F37','#FECBD2','#5C1526','#EBC0C8'];
  for(let i=0;i<40;i++){
    const s=document.createElement('span');
    s.style.left=(Math.random()*100)+'%';
    s.style.width=s.style.height=(4+Math.random()*6)+'px';
    s.style.background=cols[Math.floor(Math.random()*cols.length)];
    s.style.animationDelay=(Math.random()*0.5)+'s';
    s.style.animationDuration=(1.2+Math.random()*1)+'s';
    wrap.appendChild(s);
  }
}

function finishGame(){
  show(null);
  resetGame();
  gState='idle';
  show('s-intro');
}

// ═══════════════════════════════════════════════════
// CANVAS + GAME CONSTANTS
// ═══════════════════════════════════════════════════
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const BW=390, BH=660;
const GRAV=0.52, JUMP_V=-7.0, PW=52;
const GAP_START=188, GAP_MIN=148, SPD_START=2.0, SPD_MAX=5.0;
const RAMP_START=300, RAMP_END=1500, PIPE_INT_BASE=180;
const GROUND_Y=BH-58;
let gState='idle', gameScore=0, bird, pipes, frame, nextPipeFrame, particles, scale;
let idleF=0, trail=[], trailTimer=0;

function resize(){ const gc=document.getElementById('gc'); canvas.width=gc.offsetWidth; canvas.height=gc.offsetHeight; scale=canvas.width/BW; }
function sx(v){ return v*scale; } function sy(v){ return v*scale; }
function ease(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }
function diffT(){ return ease(Math.min(1,Math.max(0,(frame-RAMP_START)/RAMP_END))); }
function pSpeed(){ return SPD_START+(SPD_MAX-SPD_START)*diffT(); }
function pGap(){ return GAP_START-(GAP_START-GAP_MIN)*diffT(); }
function pipeInterval(){ return Math.round(PIPE_INT_BASE-35*diffT()); }
function resetBird(){ bird={x:BW*0.28,y:BH*0.43,vy:0,rot:0}; }
function resetGame(){ resetBird(); pipes=[]; frame=0; nextPipeFrame=70; gameScore=0; particles=[]; trail=[]; trailTimer=0; }

// ═══════════════════════════════════════════════════
// BACKGROUND — MARSEILLE SKYLINE
// ═══════════════════════════════════════════════════
const BG_LOOP=2200;
let bgScroll=0;

const SKY_STARS=Array.from({length:100},(_,i)=>({ lx:(i*197+11)%BG_LOOP, ly:14+(i*113)%(GROUND_Y*0.55), r:0.8+(i%3)*0.6, ph:i*0.618 }));

// Near buildings [lx, w, h, [[wx,wy]...]]
const NEAR_BLDGS=[
  [0,   50,92,[[8,20],[28,20],[8,46],[28,46],[8,72]]],
  [58,  34,68,[[7,16],[7,40],[7,58]]],
  [338, 42,80,[[7,18],[24,18],[7,44],[24,44],[7,68]]],
  [388, 28,56,[[6,14],[6,38]]],
  [424, 50,88,[[7,20],[28,20],[7,46],[28,46],[7,72]]],
  [700, 38,70,[[7,16],[7,42],[7,62]]],
  [746, 26,52,[[6,14],[6,36]]],
  [1140,44,86,[[7,20],[26,20],[7,48],[26,48],[7,72]]],
  [1193,32,68,[[7,16],[7,42]]],
  [1275,50,92,[[8,20],[28,20],[8,46],[28,46],[8,72]]],
  [1334,34,68,[[7,16],[7,40],[7,58]]],
  [1410,40,74,[[8,18],[28,18],[8,44],[28,44],[8,66]]],
  [1690,34,60,[[7,16],[7,40]]],
  [2040,46,86,[[8,20],[28,20],[8,46],[28,46],[8,72]]],
  [2100,30,54,[[6,14],[6,38]]],
];
const FAR_BLDGS=[[104,36,52],[148,26,40],[490,38,54],[536,26,40],[758,30,46],[992,34,50],[1038,24,36],[1258,34,50],[1760,30,44],[1990,28,40],[2150,30,46]];

function drawBg(t){
  const sg=ctx.createLinearGradient(0,0,0,sy(GROUND_Y));
  sg.addColorStop(0,'#FFD8EC'); sg.addColorStop(0.55,'#FECBD2'); sg.addColorStop(1,'#EBC0C8');
  ctx.fillStyle=sg; ctx.fillRect(0,0,canvas.width,sy(GROUND_Y)+1);
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,canvas.width,sy(GROUND_Y)); ctx.clip();
  for(let tile=-1;tile<=1;tile++){
    const off=tile*BG_LOOP-bgScroll;
    if(sx(off+BG_LOOP)<-20||sx(off)>canvas.width+20) continue;
    drawMarseilleScene(off,t);
  }
  ctx.restore();
  const gg=ctx.createLinearGradient(0,sy(GROUND_Y),0,canvas.height);
  gg.addColorStop(0,'#9B1F37'); gg.addColorStop(1,'#5C1526');
  ctx.fillStyle=gg; ctx.fillRect(0,sy(GROUND_Y),canvas.width,canvas.height-sy(GROUND_Y));
  ctx.fillStyle='#EBC0C8'; ctx.fillRect(0,sy(GROUND_Y),canvas.width,sy(2));
  ctx.fillStyle='rgba(92,21,38,0.4)';
  for(let gx=0;gx<canvas.width;gx+=sx(8)) ctx.fillRect(gx,sy(GROUND_Y)+sy(2),sx(4),sy(3));
}

function drawMarseilleScene(off,t){
  // Stars
  SKY_STARS.forEach(s=>{ ctx.globalAlpha=0.4+0.5*Math.sin(t*1.8+s.ph*Math.PI*2); ctx.fillStyle='#EBC0C8'; ctx.beginPath(); ctx.arc(sx(off+s.lx),sy(s.ly),sx(s.r),0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
  // Moon at x=680
  drawMoon(off+680,68,t);
  // Far buildings
  ctx.fillStyle='#7A1A2E';
  FAR_BLDGS.forEach(([lx,w,h])=>ctx.fillRect(sx(off+lx),sy(GROUND_Y-h),sx(w),sy(h)));
  // Bonne Mère (center x=185)
  drawBonneMere(off+185,t);
  // Near buildings
  NEAR_BLDGS.forEach(([lx,w,h,wins])=>{
    const bx=sx(off+lx),gy=sy(GROUND_Y),bw=sx(w),bh=sy(h);
    ctx.fillStyle='#9B1F37'; ctx.fillRect(bx,gy-bh,bw,bh);
    ctx.fillStyle='#5C1526'; ctx.fillRect(bx+bw-sx(4),gy-bh,sx(4),bh);
    ctx.fillStyle='#5C1526'; ctx.fillRect(bx,gy-bh,bw,sy(5));
    ctx.fillStyle='#FECBD2'; wins.forEach(([wx,wy])=>ctx.fillRect(bx+sx(wx),gy-bh+sy(wy),sx(10),sy(7)));
  });
  // Commissariat en feu (center x=350)
  drawBurningCommissariat(off+350,t);
  // MARSEILLE sign (center x=535)
  drawMarseilleSign(off+535);
  // Vélodrome (center x=855)
  drawVelodrome(off+855);
  // UFO (center x=1110, y=155)
  drawUFO(off+1110,155,t);
  // Mer & plage (center x=1560)
  drawBeach(off+1560,t);
  // Cours Julien — la fête (center x=1880)
  drawCoursJulien(off+1880,t);
}

function drawBurningCommissariat(cx,t){
  const x=sx(cx),gy=sy(GROUND_Y);
  const bw=sx(58),bh=sy(38),bx=x-bw/2,by=gy-bh;
  // Building body
  ctx.fillStyle='#7A1A2E'; ctx.fillRect(bx,by,bw,bh);
  // Roof
  ctx.fillStyle='#5C1526'; ctx.fillRect(bx-sx(3),by-sy(5),bw+sx(6),sy(6));
  // Windows (dark, broken)
  ctx.fillStyle='#2D0A1A';
  ctx.fillRect(bx+sx(6),by+sy(8),sx(12),sy(10));
  ctx.fillRect(bx+sx(24),by+sy(8),sx(12),sy(10));
  ctx.fillRect(bx+sx(40),by+sy(8),sx(12),sy(10));
  // Door
  ctx.fillRect(bx+sx(22),by+bh-sy(16),sx(14),sy(16));
  // Sign ACAB
  ctx.fillStyle='#FECBD2'; ctx.font=`bold ${sx(9)}px Poppins,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('ACAB',x,by+sy(26));
  // Flames (animated)
  const flames=[[0,0],[sx(12),-sy(2)],[sx(-10),-sy(1)],[sx(20),sy(1)],[sx(-22),0]];
  flames.forEach(([fx,fy],i)=>{
    const fl=0.5+0.5*Math.sin(t*5+i*1.3),h=sy(10+fl*8);
    const gf=ctx.createLinearGradient(x+fx,by+fy,x+fx,by+fy-h);
    gf.addColorStop(0,'rgba(255,80,0,0.95)');
    gf.addColorStop(0.5,'rgba(255,200,0,0.8)');
    gf.addColorStop(1,'rgba(255,255,100,0)');
    ctx.fillStyle=gf;
    ctx.beginPath();
    ctx.moveTo(x+fx-sx(5),by+fy);
    ctx.quadraticCurveTo(x+fx,by+fy-h*1.2,x+fx+sx(5),by+fy);
    ctx.fill();
  });
  // Smoke puffs
  for(let s=0;s<3;s++){
    const sp=((t*0.4+s*0.33)%1),sy2=sy(20+sp*40),salpha=(1-sp)*0.35;
    ctx.globalAlpha=salpha; ctx.fillStyle='#2D0A1A';
    ctx.beginPath(); ctx.arc(x-sx(8)+sx(s*12),by-sy2,sx(6+sp*8),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawMoon(lx,ly,t){
  const x=sx(lx),y=sy(ly);
  ctx.fillStyle='#FFF0F3'; ctx.beginPath(); ctx.arc(x,y,sx(22),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFD8EC'; ctx.beginPath(); ctx.arc(x+sx(9),y-sx(5),sx(18),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,250,252,0.75)';
  [[36,0],[28,-15],[-12,-24]].forEach(([dx,dy])=>{
    const pulse=0.5+0.5*Math.sin(t*2.1+dx*0.1);
    ctx.globalAlpha=pulse*0.75;
    ctx.fillRect(x+sx(dx)-sx(0.8),y+sy(dy)-sy(3),sx(1.5),sy(6));
    ctx.fillRect(x+sx(dx)-sx(3),y+sy(dy)-sy(0.8),sx(6),sy(1.5));
  });

}

function drawBonneMere(cx,t){
  const x=sx(cx),gy=sy(GROUND_Y);
  // Hill (dark trapezoid)
  ctx.fillStyle='#5C1526';
  ctx.beginPath(); ctx.moveTo(x-sx(130),gy); ctx.lineTo(x+sx(130),gy); ctx.lineTo(x+sx(55),gy-sy(92)); ctx.lineTo(x-sx(55),gy-sy(92)); ctx.closePath(); ctx.fill();
  // Forest at base
  ctx.fillStyle='#6B1E2E';
  for(let ti=-3;ti<=3;ti++){
    const tx=x+ti*sx(36)+sx(6),th=sy(16+Math.abs(ti)*3);
    ctx.beginPath(); ctx.moveTo(tx-sx(10),gy); ctx.lineTo(tx+sx(10),gy); ctx.lineTo(tx,gy-th); ctx.closePath(); ctx.fill();
  }
  const htop=gy-sy(92);
  // Fort/base
  const fortW=sx(108),fortH=sy(26);
  ctx.fillStyle='#9B1F37'; ctx.fillRect(x-fortW/2,htop-fortH,fortW,fortH);
  ctx.fillStyle='#5C1526'; ctx.fillRect(x-fortW/2,htop-fortH,fortW,sy(4)); ctx.fillRect(x-fortW/2,htop-fortH/2,fortW,sy(2));
  // Basilica body
  const bW=sx(94),bH=sy(38),bX=x-bW/2,bY=htop-fortH-bH;
  ctx.fillStyle='#9B1F37'; ctx.fillRect(bX,bY,bW,bH);
  // Alternating stone stripes (characteristic of the real building)
  ctx.fillStyle='#5C1526';
  for(let s=0;s<4;s++) ctx.fillRect(bX,bY+sy(s*9),bW,sy(2.5));
  // Basilica windows
  ctx.fillStyle='#FECBD2';
  for(let wi=0;wi<4;wi++){
    const wx=bX+sx(4+wi*22),wy=bY+sy(18);
    ctx.fillRect(wx,wy,sx(8),sy(14));
    ctx.beginPath(); ctx.arc(wx+sx(4),wy,sx(4),Math.PI,0,false); ctx.fill();
  }
  // Dome (left of center)
  const dX=bX+bW*0.3,dY=bY,dR=sx(19);
  ctx.fillStyle='#C44060'; ctx.beginPath(); ctx.arc(dX,dY,dR,Math.PI,0,false); ctx.fill();
  ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(1.5);
  for(let ds=0;ds<3;ds++){ ctx.beginPath(); ctx.arc(dX,dY,dR*(0.4+ds*0.3),Math.PI,0,false); ctx.stroke(); }
  // Dome cross
  ctx.fillStyle='#EBC0C8';
  ctx.fillRect(dX-sx(1.5),dY-dR-sy(7),sx(3),sy(7));
  ctx.fillRect(dX-sx(4),dY-dR-sy(3),sx(8),sy(2));
  // Bell tower (tall, right of center)
  const twX=x+sx(14),twY=bY-sy(75),twW=sx(22),twH=sy(75);
  ctx.fillStyle='#9B1F37'; ctx.fillRect(twX,twY,twW,twH);
  ctx.fillStyle='#5C1526';
  for(let ts=0;ts<5;ts++) ctx.fillRect(twX,twY+sy(ts*14),twW,sy(2.5));
  // Tower windows
  ctx.fillStyle='#FECBD2';
  for(let tl=0;tl<3;tl++){
    const wy=twY+sy(12+tl*21);
    ctx.fillRect(twX+sx(6),wy,sx(10),sy(12));
    ctx.beginPath(); ctx.arc(twX+sx(11),wy,sx(5),Math.PI,0,false); ctx.fill();
  }
  // Tower cornice
  ctx.fillStyle='#5C1526'; ctx.fillRect(twX-sx(4),twY,twW+sx(8),sy(5));
  // Pillar above tower
  const pilY=twY-sy(26);
  ctx.fillStyle='#9B1F37'; ctx.fillRect(twX+sx(9),pilY,sx(4),sy(26));
  // Golden Madonna — the iconic gold statue
  const mX=twX+sx(11),mY=pilY-sy(16);
  // Halo glow
  const glow=0.5+0.5*Math.sin(t*2.4);
  ctx.globalAlpha=glow*0.55; ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(mX,mY,sx(12),0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // Madonna figure (gold)
  ctx.fillStyle='#D4A820';
  ctx.beginPath(); ctx.arc(mX,mY-sy(4),sx(4),0,Math.PI*2); ctx.fill(); // head
  ctx.fillRect(mX-sx(3.5),mY,sx(7),sx(12)); // body
  ctx.fillRect(mX-sx(8),mY+sx(2),sx(5),sx(2.5)); // left arm
  ctx.fillRect(mX+sx(3.5),mY+sx(2),sx(5),sx(2.5)); // right arm
}

function drawVelodrome(cx){
  const x=sx(cx),gy=sy(GROUND_Y);
  const sW=sx(266),boxH=sy(48),sX=x-sW/2,boxTop=gy-boxH;
  const outline='#C0395A';

  // ── COCOON ARCH (crescent blanc, contour bordeaux) ──
  const archW=sW+sx(36),archX=x-archW/2,baseY=boxTop+sy(2);
  const apexTop=baseY-sy(96),apexBot=baseY-sy(56);
  function archPath(){
    ctx.beginPath();
    ctx.moveTo(archX,baseY);
    ctx.bezierCurveTo(archX+archW*0.20,apexTop,archX+archW*0.80,apexTop,archX+archW,baseY);
    ctx.bezierCurveTo(archX+archW*0.80,apexBot,archX+archW*0.20,apexBot,archX,baseY);
    ctx.closePath();
  }
  archPath(); ctx.fillStyle='#EFEAEC'; ctx.fill();
  // nervures verticales discrètes
  ctx.save(); archPath(); ctx.clip();
  ctx.strokeStyle='rgba(192,57,90,0.35)'; ctx.lineWidth=sx(1.4);
  for(let ri=1;ri<10;ri++){ const rx=archX+archW*(ri/10); ctx.beginPath(); ctx.moveTo(rx,baseY+sy(2)); ctx.lineTo(rx,apexTop); ctx.stroke(); }
  ctx.restore();
  archPath(); ctx.strokeStyle=outline; ctx.lineWidth=sx(3); ctx.lineJoin='round'; ctx.stroke();
  // MARSEILLE
  ctx.fillStyle='#4A1020'; ctx.font=`800 ${sx(12)}px Poppins,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('MARSEILLE',x,baseY-sy(72));

  // ── TRIBUNE (box bordeaux + fenêtres + OM) ──
  ctx.fillStyle='#9B1F37'; ctx.fillRect(sX,boxTop,sW,boxH);
  ctx.fillStyle='#5C1526'; ctx.fillRect(sX,gy-sy(8),sW,sy(8));
  // fenêtres verticales pâles
  ctx.fillStyle='rgba(255,224,232,0.26)';
  const nW=9,wW=sx(15),wGap=(sW-sx(14)-nW*wW)/(nW-1);
  for(let i=0;i<nW;i++) ctx.fillRect(sX+sx(7)+i*(wW+wGap),boxTop+sy(9),wW,boxH-sy(20));
  // OM
  ctx.fillStyle='#F2E6EA'; ctx.font=`900 ${sx(28)}px Poppins,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('OM',x,boxTop+boxH*0.52);

  // ── MÂTS D'ÉCLAIRAGE ──
  [0.16,0.39,0.61,0.84].forEach(pct=>{
    const mx=sX+sW*pct,poleTop=boxTop-sy(30);
    ctx.strokeStyle='#7A1A2E'; ctx.lineWidth=sx(2.4); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(mx,boxTop); ctx.lineTo(mx,poleTop); ctx.stroke();
    ctx.fillStyle='#E8DCE0'; ctx.beginPath(); ctx.roundRect(mx-sx(10),poleTop-sy(6),sx(20),sy(8),sx(2)); ctx.fill();
    ctx.strokeStyle=outline; ctx.lineWidth=sx(1.6); ctx.stroke();
  });
  ctx.textBaseline='alphabetic';
}

function drawParasol(px,baseY,tilt){
  ctx.save(); ctx.translate(px,baseY); ctx.rotate(tilt);
  const poleH=sy(42);
  ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(2.5); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-poleH); ctx.stroke();
  const cw=sx(30),apexY=-poleH-sy(15),rimY=-poleH+sy(2),nseg=8,cols=['#9B1F37','#FFFAFC'];
  for(let s=0;s<nseg;s++){
    const x0=-cw+2*cw*(s/nseg),x1=-cw+2*cw*((s+1)/nseg);
    ctx.fillStyle=cols[s%2];
    ctx.beginPath(); ctx.moveTo(0,apexY); ctx.lineTo(x0,rimY); ctx.lineTo(x1,rimY); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='#9B1F37';
  for(let s=0;s<nseg;s++){ const xc=-cw+2*cw*((s+0.5)/nseg); ctx.beginPath(); ctx.arc(xc,rimY,cw/nseg*0.95,0,Math.PI); ctx.fill(); }
  ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(1.5); ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(-cw,rimY); ctx.lineTo(0,apexY); ctx.lineTo(cw,rimY); ctx.stroke();
  ctx.fillStyle='#5C1526'; ctx.beginPath(); ctx.arc(0,apexY-sy(1),sx(2),0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBeach(cx,t){
  const x=sx(cx),gy=sy(GROUND_Y),halfW=sx(115),seaTop=gy-sy(50);
  // SEA
  ctx.save(); ctx.beginPath(); ctx.rect(x-halfW,seaTop-sy(4),halfW*2,gy-seaTop+sy(5)); ctx.clip();
  ctx.fillStyle='#D77793'; ctx.fillRect(x-halfW,seaTop,halfW*2,gy-seaTop);
  ctx.fillStyle='#C8627E'; ctx.fillRect(x-halfW,seaTop,halfW*2,sy(11));
  ctx.fillStyle='#E596AC'; ctx.fillRect(x-halfW,gy-sy(20),halfW*2,sy(20));
  ctx.strokeStyle='rgba(255,240,243,0.85)'; ctx.lineWidth=sx(1.4); ctx.lineCap='round';
  for(let row=0;row<4;row++){
    const wy=seaTop+sy(5)+row*sy(10);
    ctx.beginPath();
    for(let wx=-halfW;wx<=halfW;wx+=sx(5)){ const yy=wy+Math.sin(wx*0.06+t*2.2+row*1.3)*sy(1.6); wx===-halfW?ctx.moveTo(x+wx,yy):ctx.lineTo(x+wx,yy); }
    ctx.stroke();
  }
  ctx.restore();
  // SAND mound
  ctx.fillStyle='#F0DAC0';
  ctx.beginPath(); ctx.moveTo(x-halfW-sx(6),gy+sy(1)); ctx.quadraticCurveTo(x-halfW*0.3,gy-sy(26),x+sx(10),gy-sy(22)); ctx.quadraticCurveTo(x+halfW*0.7,gy-sy(18),x+halfW+sx(6),gy+sy(1)); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(155,31,55,0.06)';
  ctx.beginPath(); ctx.moveTo(x-halfW-sx(6),gy+sy(1)); ctx.quadraticCurveTo(x-halfW*0.3,gy-sy(26),x+sx(10),gy-sy(22)); ctx.lineTo(x+sx(10),gy-sy(17)); ctx.quadraticCurveTo(x-halfW*0.3,gy-sy(20),x-halfW-sx(6),gy+sy(5)); ctx.closePath(); ctx.fill();
  // PARASOLS
  drawParasol(x-sx(50),gy-sy(13),-0.12);
  drawParasol(x+sx(36),gy-sy(9),0.14);
  // beach ball
  const ballX=x-sx(8),ballY=gy-sy(8);
  ctx.fillStyle='#FFFAFC'; ctx.beginPath(); ctx.arc(ballX,ballY,sx(5),0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#9B1F37'; ctx.beginPath(); ctx.moveTo(ballX,ballY); ctx.arc(ballX,ballY,sx(5),-0.5,0.7); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(92,21,38,0.4)'; ctx.lineWidth=sx(0.8); ctx.beginPath(); ctx.arc(ballX,ballY,sx(5),0,Math.PI*2); ctx.stroke();
}

// ── COURS JULIEN — LA FÊTE ──
function drawCoursJulien(cx,t){
  const x=sx(cx),gy=sy(GROUND_Y),wallW=sx(124),wallH=sy(74),wx=x-wallW/2,wy=gy-wallH;
  // wall
  ctx.fillStyle='#5A1825'; ctx.fillRect(wx,wy,wallW,wallH);

  ctx.fillStyle='#E03890'; ctx.beginPath(); ctx.ellipse(wx+sx(30),wy+sy(22),sx(27),sy(14),0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(2); ctx.stroke();

  ctx.fillText('Cours',wx+sx(30),wy+sy(17));
  ctx.fillText('Julien',wx+sx(30),wy+sy(27));
  // teal blob + drips
  ctx.fillStyle='#1A7A58'; ctx.beginPath(); ctx.ellipse(wx+sx(88),wy+sy(18),sx(16),sy(10),0,0,Math.PI*2); ctx.fill();
  [0,1,2].forEach(d=>ctx.fillRect(wx+sx(80+d*8),wy+sy(25),sx(2.5),sy(8+d*3)));
  // gold spray star
  ctx.fillStyle='#E8C840'; drawTinyStarAt(wx+sx(106),wy+sy(42),sx(8));

  ctx.strokeStyle='#FFFAFC'; ctx.lineWidth=sx(1.5); ctx.lineCap='round';

  // door (bar)
  ctx.fillStyle='#2D0A1A'; ctx.fillRect(x-sx(14),gy-sy(30),sx(28),sy(30));
  ctx.fillStyle='#E8C840'; ctx.font=`800 ${sx(7)}px Poppins,sans-serif`; ctx.fillText('BAR',x,gy-sy(36));
  // disco ball
  const dbx=x+sx(40),dby=wy-sy(26);

  for(let b=0;b<6;b++){
    const ang=t*0.8+b*(Math.PI/3),col=['rgba(224,56,144,0.18)','rgba(232,200,64,0.16)','rgba(255,240,243,0.16)'][b%3];
    ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(dbx,dby);
    ctx.lineTo(dbx+Math.cos(ang-0.12)*sx(64),dby+Math.sin(ang-0.12)*sx(64));
    ctx.lineTo(dbx+Math.cos(ang+0.12)*sx(64),dby+Math.sin(ang+0.12)*sx(64));
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='#C0C8D0'; ctx.beginPath(); ctx.arc(dbx,dby,sx(9),0,Math.PI*2); ctx.fill();
  for(let fy=-2;fy<=2;fy++) for(let fx=-2;fx<=2;fx++){
    const px=dbx+fx*sx(3.4),py=dby+fy*sx(3.4);
    if((px-dbx)**2+(py-dby)**2>sx(9)**2) continue;
    ctx.fillStyle=((fx+fy+Math.floor(t*4))%3===0)?'#FFFAFC':'#8A92A0';
    ctx.fillRect(px-sx(1.4),py-sx(1.4),sx(2.8),sx(2.8));
  }
  ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(1); ctx.beginPath(); ctx.arc(dbx,dby,sx(9),0,Math.PI*2); ctx.stroke();
  // string lights (guirlande)
  const lc=['#E03890','#E8C840','#FFF0F3','#1A7A58'],lx0=wx-sx(4),lx1=wx+wallW+sx(4),cyL=wy+sy(10),nB=9;

  for(let b=0;b<=nB;b++){

    ctx.beginPath(); ctx.arc(px,py+sy(2),sx(2.4),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // bottles on shelf
  const shelfY=gy-sy(8),bottleCols=['#1A7A58','#9B1F37','#E8C840','#7A8840'];

  ctx.fillStyle='#2D0A1A'; ctx.fillRect(x-sx(46),shelfY,sx(42),sy(3));
  // cocktail glass

  ctx.beginPath(); ctx.moveTo(gx,gyy); ctx.lineTo(gx,gyy+sy(8)); ctx.stroke();
  ctx.fillStyle='#E03890'; ctx.beginPath(); ctx.moveTo(gx-sx(4),gyy-sy(6.5)); ctx.lineTo(gx,gyy-sy(1)); ctx.lineTo(gx+sx(4),gyy-sy(6.5)); ctx.closePath(); ctx.fill();
  // floating notes
  ctx.fillStyle='#FFFAFC'; ctx.font=`${sx(11)}px serif`; ctx.textAlign='center';
  for(let n=0;n<3;n++){

    ctx.globalAlpha=(1-np)*0.8; ctx.fillText(n%2?'♪':'♫',nx,ny);

// STAR CHARACTER
// ═══════════════════════════════════════════════════
const TRAIL_COLS=['#FECBD2','#FFFAFC','#EBC0C8','#FFB8CC'];
function emitTrail(lx,ly){ trail.push({lx:lx-7+(Math.random()-0.5)*5,ly:ly+(Math.random()-0.5)*7,vx:-(0.6+Math.random()*1.4),vy:(Math.random()-0.5)*0.9,life:1,size:1.2+Math.random()*2.8,col:TRAIL_COLS[Math.floor(Math.random()*TRAIL_COLS.length)],isStar:Math.random()>0.38}); if(trail.length>55)trail.shift(); }
function updateTrail(dt){ trail.forEach(t=>{t.lx+=t.vx*dt;t.ly+=t.vy*dt;t.vy+=0.07*dt;t.life-=0.048*dt;}); trail=trail.filter(t=>t.life>0); }
function drawTinyStarAt(cx,cy,r){ ctx.beginPath(); for(let i=0;i<8;i++){const a=(i*Math.PI)/4-Math.PI/8,rad=i%2===0?r:r*0.4;if(i===0)ctx.moveTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);else ctx.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);} ctx.closePath(); ctx.fill(); }
function drawTrail(){ trail.forEach(t=>{ctx.globalAlpha=Math.max(0,t.life*0.85);ctx.fillStyle=t.col;if(t.isStar)drawTinyStarAt(sx(t.lx),sy(t.ly),sx(t.size));else{ctx.beginPath();ctx.arc(sx(t.lx),sy(t.ly),sx(t.size*0.55),0,Math.PI*2);ctx.fill();}});ctx.globalAlpha=1; }

function drawStar(lx,ly,rot){
  ctx.save(); ctx.translate(sx(lx),sy(ly)); ctx.rotate(rot*0.12);
  const R=sx(14),r=sx(5.5);
  function starPath(){ ctx.beginPath(); for(let i=0;i<10;i++){const a=(i*Math.PI)/5-Math.PI/2,rad=i%2===0?R:r;if(i===0)ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);else ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);} ctx.closePath(); }
  ctx.shadowColor='rgba(155,31,55,0.5)'; ctx.shadowBlur=sx(10);
  starPath(); ctx.fillStyle='#9B1F37'; ctx.fill(); ctx.shadowBlur=0;
  ctx.save(); starPath(); ctx.clip();
  const hg=ctx.createRadialGradient(-R*.22,-R*.32,sx(1),-R*.08,-R*.18,R*.75);
  hg.addColorStop(0,'rgba(220,70,100,0.9)'); hg.addColorStop(0.55,'rgba(155,31,55,0.25)'); hg.addColorStop(1,'rgba(92,21,38,0)');
  ctx.fillStyle=hg; ctx.fillRect(-R,-R,R*2,R*2); ctx.restore();
  starPath(); ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(2); ctx.lineJoin='round'; ctx.stroke();
  const eS=sx(3.2),eY=-sy(1.5);
  ctx.fillStyle='#1A0510'; ctx.fillRect(-sx(5.5)-eS/2,eY-eS/2,eS,eS); ctx.fillRect(sx(2.5)-eS/2,eY-eS/2,eS,eS);
  ctx.fillStyle='#FFFAFC'; ctx.fillRect(-sx(5.5)-eS/2+sx(1),eY-eS/2,sx(1.3),sx(1.3)); ctx.fillRect(sx(2.5)-eS/2+sx(1),eY-eS/2,sx(1.3),sx(1.3));
  ctx.globalAlpha=0.65; ctx.fillStyle='#FECBD2';
  ctx.beginPath(); ctx.ellipse(-sx(7.5),sy(3),sx(4),sy(2.5),0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx(5.8),sy(3),sx(4),sy(2.5),0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(1.5); ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,sy(2.5),sx(3.5),0.1,Math.PI-0.1); ctx.stroke();
  if(bird&&bird.vy<-2.5&&gState==='playing'){
    ctx.strokeStyle='#FECBD2'; ctx.lineWidth=sx(1.5); ctx.globalAlpha=0.65;
    for(let el=0;el<3;el++){const ely=-sy(3+el*5),elLen=sx(7+el*4);ctx.beginPath();ctx.moveTo(-R-sx(3),ely);ctx.lineTo(-R-sx(3)-elLen,ely);ctx.stroke();}
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawNailArt(x,y,w,h,d){
  if(h<sy(8)||w<sx(6)) return;
  ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  switch(d.p){

    case 'olive_wavy':
      // 2 swipe strokes épaisses à la Janne
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.strokeStyle=d.a1; ctx.lineWidth=sx(6);
      ctx.beginPath(); ctx.moveTo(x+w*0.05,y+h*0.18); ctx.bezierCurveTo(x+w*0.38,y+h*0.28,x+w*0.55,y+h*0.32,x+w*0.95,y+h*0.22); ctx.stroke();
      ctx.strokeStyle=d.a2; ctx.lineWidth=sx(4.5);
      ctx.beginPath(); ctx.moveTo(x+w*0.08,y+h*0.55); ctx.bezierCurveTo(x+w*0.32,y+h*0.68,x+w*0.6,y+h*0.58,x+w*0.94,y+h*0.72); ctx.stroke();
      // Gel dots (petites billes)
      [[0.28,0.22],[0.62,0.4],[0.45,0.65],[0.72,0.8]].forEach(([rx,ry])=>{
        const sy2=y+ry*h; if(sy2>y+h-sy(6)) return;
        ctx.fillStyle=d.a2; ctx.beginPath(); ctx.arc(x+rx*w,sy2,sx(3.5),0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.beginPath(); ctx.arc(x+rx*w-sx(1),sy2-sx(1),sx(1.2),0,Math.PI*2); ctx.fill();
      });
      break;

    case 'seashell':
      // Rayons éventail depuis le côté droit — motif coquillage
      const fanStep=sy(64);
      for(let fy=y+fanStep/2;fy<y+h;fy+=fanStep){
        const oX=x+w*0.88,numR=7,rLen=w*1.15;
        for(let ri=0;ri<numR;ri++){
          const ang=-Math.PI*0.9+(ri/(numR-1))*Math.PI*0.75;
          ctx.strokeStyle=ri%2===0?d.a1:d.a2; ctx.lineWidth=sx(ri===3?3:2); ctx.lineCap='round';
          ctx.beginPath(); ctx.moveTo(oX,fy); ctx.lineTo(oX+Math.cos(ang)*rLen,fy+Math.sin(ang)*rLen); ctx.stroke();
        }
        // Perle
        ctx.fillStyle='#FFFAFC'; ctx.beginPath(); ctx.arc(oX,fy,sx(3.5),0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(58,108,184,0.4)'; ctx.beginPath(); ctx.arc(oX,fy,sx(3.5),0,Math.PI*2); ctx.fill();
      }
      break;

    case 'teal_swirls':
      // Tourbillons de peinture organiques — pink & lilas
      ctx.lineCap='round'; ctx.lineJoin='round';
      const swirlStep=sy(72);
      for(let sy3=y+sy(18);sy3<y+h;sy3+=swirlStep){
        // Swirl rose
        ctx.strokeStyle=d.a1; ctx.lineWidth=sx(5.5);
        ctx.beginPath(); ctx.moveTo(x+w*0.12,sy3-sy(10)); ctx.bezierCurveTo(x+w*0.5,sy3-sy(20),x+w*0.7,sy3+sy(5),x+w*0.88,sy3); ctx.stroke();
        // Swirl lilas
        ctx.strokeStyle=d.a2; ctx.lineWidth=sx(4);
        ctx.beginPath(); ctx.moveTo(x+w*0.08,sy3+sy(10)); ctx.bezierCurveTo(x+w*0.35,sy3+sy(25),x+w*0.65,sy3+sy(8),x+w*0.92,sy3+sy(22)); ctx.stroke();
      }
      // Reflets blancs (glazing)
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=sx(2);
      ctx.beginPath(); ctx.moveTo(x+w*0.62,y+sy(8)); ctx.lineTo(x+w*0.78,y+h*0.28); ctx.stroke();
      break;

    case 'leopard':
      // Taches léopard — C-shapes et blobs
      ctx.strokeStyle=d.a1; ctx.lineWidth=sx(3.5); ctx.lineCap='round';
      const spotStep=sy(26);
      [[0.22,0],[0.65,0.5],[0.42,0.25]].forEach(([rx,yo])=>{
        for(let row=0;row*spotStep<h+sy(8);row++){
          const sy4=y+row*spotStep+yo*spotStep; if(sy4<y||sy4>y+h) continue;
          const rot=(row*1.37+rx*5.1)%(Math.PI*2);
          ctx.save(); ctx.translate(x+rx*w,sy4); ctx.rotate(rot);
          ctx.beginPath(); ctx.arc(0,0,sx(4.5),0.35,Math.PI*1.65); ctx.stroke();
          if((row*3+Math.round(rx*4))%4===0){ ctx.fillStyle=d.a2; ctx.beginPath(); ctx.arc(sx(2.5),sx(1.5),sx(2),0,Math.PI*2); ctx.fill(); }
          ctx.restore();
        }
      });
      break;

    case 'floral':
      // Marguerites bleues et vertes
      const flStep=sy(68);
      for(let fy2=y+sy(34);fy2<y+h;fy2+=flStep){
        const isBlue=Math.floor((fy2-y)/flStep)%2===0;
        const pColor=isBlue?d.a1:d.a2,fLen=sx(9),nPetals=7;
        const fX=x+w*(isBlue?0.4:0.6);
        ctx.fillStyle=pColor;
        for(let pi=0;pi<nPetals;pi++){
          const ang=(pi/nPetals)*Math.PI*2;
          ctx.save(); ctx.translate(fX+Math.cos(ang)*fLen,fy2+Math.sin(ang)*fLen); ctx.rotate(ang);
          ctx.beginPath(); ctx.ellipse(0,0,sx(4.5),sx(2.5),0,0,Math.PI*2); ctx.fill();
          ctx.restore();
        }
        // Centre jaune
        ctx.fillStyle=d.a3||'#E8C820'; ctx.beginPath(); ctx.arc(fX,fy2,sx(4),0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(fX-sx(1),fy2-sx(1),sx(1.5),0,Math.PI*2); ctx.fill();
        // Petits dots accent
        ctx.fillStyle=d.a3||'#E8C820';
        [[0.15,-0.5],[0.8,-0.3],[0.1,0.6]].forEach(([drx,dry])=>{ const dy=fy2+dry*fLen*1.8; if(dy>y&&dy<y+h){ctx.beginPath();ctx.arc(x+drx*w,dy,sx(2),0,Math.PI*2);ctx.fill();} });
      }
      break;

    case 'stars_blue':
      // 5-point étoiles marine sur bleu ciel
      const sSizes=[sx(11),sx(7.5),sx(9)];
      const sPos=[[0.35,0.22],[0.62,0.56],[0.24,0.75]];
      const sStep=sy(62);
      for(let tile=0;tile*sStep<h+sy(20);tile++){
        sPos.forEach(([rx,ry],si)=>{
          const sX2=x+rx*w,sY2=y+tile*sStep+ry*sStep;
          if(sY2<y||sY2>y+h) return;
          const R2=sSizes[si%3],r2=R2*0.4;
          ctx.fillStyle=d.a1; ctx.beginPath();
          for(let i=0;i<10;i++){const a2=(i*Math.PI)/5-Math.PI/2,rad2=i%2===0?R2:r2;if(i===0)ctx.moveTo(sX2+Math.cos(a2)*rad2,sY2+Math.sin(a2)*rad2);else ctx.lineTo(sX2+Math.cos(a2)*rad2,sY2+Math.sin(a2)*rad2);}
          ctx.closePath(); ctx.fill();
        });
      }
      break;

    case 'rainbow':
      // Clusters de fines rayures arc-en-ciel sur fond nude
      const rbCols=['#E07070','#EAA24E','#ECD24E','#6FB86A','#5AA8DC','#9C7AC8'];
      const rbH=sy(3.4), rbGap=sy(150);
      for(let cy0=y+sy(34); cy0<y+h; cy0+=rbGap){
        let yy=cy0;
        rbCols.forEach(c=>{ if(yy>y+h-sy(2))return; ctx.fillStyle=c; ctx.fillRect(x,yy,w,rbH); yy+=rbH+sy(2.4); });
      }
      break;

    case 'studs':
      // Studs métalliques — dots sombres en arc
      const studRows=Math.ceil(h/sy(14));
      for(let srow=0;srow<studRows;srow++){
        const sy6=y+sy(8)+srow*sy(14); if(sy6>y+h-sy(6)) break;
        const cols=srow%2===0?[0.22,0.5,0.78]:[0.36,0.64];
        cols.forEach(rx=>{
          const sx3=x+rx*w;
          ctx.fillStyle=d.a1; ctx.beginPath(); ctx.arc(sx3,sy6,sx(3.5),0,Math.PI*2); ctx.fill();
          // Reflet argenté
          ctx.fillStyle='rgba(255,255,255,0.52)'; ctx.beginPath(); ctx.arc(sx3-sx(1),sy6-sx(1),sx(1.4),0,Math.PI*2); ctx.fill();
          // Highlight bas
          ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(sx3+sx(0.8),sy6+sx(0.8),sx(0.8),0,Math.PI*2); ctx.fill();
        });
      }
      break;

    case 'folk_blue':
      // Motifs éventail Delft — cobalt sur nude
      const folkStep=sy(68);
      for(let fy3=y+sy(34);fy3<y+h;fy3+=folkStep){
        const fromRight=Math.floor((fy3-y)/folkStep)%2===0;
        const oX2=fromRight?x+w*0.88:x+w*0.12;
        const nFan=7,fanLen2=sx(20);
        ctx.strokeStyle=d.a1; ctx.lineWidth=sx(2); ctx.lineCap='round';
        for(let fi=0;fi<nFan;fi++){
          const baseAng=fromRight?-Math.PI*1.25:-Math.PI*0.75;
          const ang=baseAng+(fi/(nFan-1))*Math.PI*0.85;
          const eX=oX2+Math.cos(ang)*fanLen2,eY=fy3+Math.sin(ang)*fanLen2;
          ctx.beginPath(); ctx.moveTo(oX2,fy3); ctx.lineTo(eX,eY); ctx.stroke();
          // Petales ovales aux extrémités
          if(fi%2===0){ ctx.fillStyle=d.a1; ctx.save(); ctx.translate(eX,eY); ctx.rotate(ang); ctx.beginPath(); ctx.ellipse(0,0,sx(3.5),sx(2),0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
        }
        // Petits dots
        ctx.fillStyle=d.a1;
        [[fromRight?-0.4:0.4,-0.6],[fromRight?-0.2:0.2,0.7],[fromRight?-0.6:0.6,0.1]].forEach(([dx,dy])=>{
          const dotY=fy3+dy*fanLen2; if(dotY>y&&dotY<y+h){ctx.beginPath();ctx.arc(oX2+dx*fanLen2,dotY,sx(2.2),0,Math.PI*2);ctx.fill();}
        });
      }
      break;

    case 'fish':
      // Petits poissons qui nagent — bleu / jaune / rouge
      const fishCols=[d.a1,d.a2,d.a3];
      let fk=Math.floor((y<0?0:y)/sy(30))%3;
      for(let fy=y+sy(24); fy<y+h-sy(10); fy+=sy(30)){
        drawFishAt(x+w*((fk%2===0)?0.36:0.62), fy, sx(9), fishCols[fk%3]);
        fk++;
      }
      break;
  }
  ctx.restore();
}

// ── Cartoon press-on rendering (gros contour + cap glossy) ──
const PIPE_OUTLINE='#3A2A1E';
function pipePath(px,py,w,h,r,roundSide){
  ctx.beginPath();
  if(roundSide==='bottom'){
    ctx.moveTo(px,py); ctx.lineTo(px+w,py); ctx.lineTo(px+w,py+h-r);
    ctx.arcTo(px+w,py+h,px+w-r,py+h,r); ctx.lineTo(px+r,py+h);
    ctx.arcTo(px,py+h,px,py+h-r,r); ctx.closePath();
  }else{
    ctx.moveTo(px,py+h); ctx.lineTo(px+w,py+h); ctx.lineTo(px+w,py+r);
    ctx.arcTo(px+w,py,px+w-r,py,r); ctx.lineTo(px+r,py);
    ctx.arcTo(px,py,px,py+r,r); ctx.closePath();
  }
}
function drawCapGloss(px,py,w,h,roundSide){
  ctx.save(); pipePath(px,py,w,h,Math.min(w,h)*0.42,roundSide); ctx.clip();
  const shineY=roundSide==='bottom'?py+h*0.30:py+h*0.70;
  ctx.fillStyle='rgba(255,255,255,0.36)';
  ctx.beginPath(); ctx.ellipse(px+w*0.40,shineY,w*0.30,h*0.20,-0.25,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.13)';
  ctx.fillRect(px,roundSide==='bottom'?py+h-h*0.26:py,w,h*0.26);
  ctx.restore();
}
function bodySheen(px,py,w,h){
  ctx.save(); ctx.beginPath(); ctx.rect(px,py,w,h); ctx.clip();
  ctx.fillStyle='rgba(255,255,255,0.11)'; ctx.fillRect(px+w*0.14,py,w*0.14,h);
  ctx.fillStyle='rgba(0,0,0,0.07)'; ctx.fillRect(px+w*0.80,py,w*0.20,h);
  ctx.restore();
}
function drawFishAt(cx,cy,r,col){
  // poisson orienté vers la gauche (sens du défilement)
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(cx+r*0.65,cy); ctx.lineTo(cx+r*1.5,cy-r*0.7); ctx.lineTo(cx+r*1.5,cy+r*0.7); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+r*0.1,cy-r*0.5); ctx.lineTo(cx+r*0.5,cy-r*0.95); ctx.lineTo(cx+r*0.55,cy-r*0.4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx,cy,r,r*0.62,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.30)'; ctx.lineWidth=sx(1); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.32)'; ctx.beginPath(); ctx.ellipse(cx-r*0.05,cy-r*0.26,r*0.5,r*0.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.arc(cx-r*0.52,cy-r*0.08,r*0.27,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#16202A'; ctx.beginPath(); ctx.arc(cx-r*0.52,cy-r*0.08,r*0.13,0,Math.PI*2); ctx.fill();
}
function drawNailPipe(lx,topH,gap,dIdx){
  const d=NAIL_DESIGNS[dIdx%NAIL_DESIGNS.length];
  const px=sx(lx), pw=sx(PW), out=PIPE_OUTLINE, ow=sx(3.4);
  const cap=d.cap||d.tip, capH=sy(30), capR=sx(15);

  // TOP — cap au bord du gap (en bas)
  const topBot=sy(topH), tpY=-sy(6), tpH=topBot-tpY;
  if(tpH>0){
    pipePath(px,tpY,pw,tpH,capR,'bottom'); ctx.fillStyle=d.body; ctx.fill();
    const bH=tpH-capH;
    if(bH>0){ ctx.save(); ctx.beginPath(); ctx.rect(px,tpY,pw,bH); ctx.clip(); drawNailArt(px,tpY,pw,bH,d); bodySheen(px,tpY,pw,bH); ctx.restore(); }
    pipePath(px,topBot-capH,pw,capH,capR,'bottom'); ctx.fillStyle=cap; ctx.fill();
    drawCapGloss(px,topBot-capH,pw,capH,'bottom');
    ctx.strokeStyle=out; ctx.lineWidth=ow*0.7; ctx.beginPath(); ctx.moveTo(px,topBot-capH); ctx.lineTo(px+pw,topBot-capH); ctx.stroke();
    pipePath(px,tpY,pw,tpH,capR,'bottom'); ctx.strokeStyle=out; ctx.lineWidth=ow; ctx.lineJoin='round'; ctx.stroke();
  }

  // BOTTOM — cap au bord du gap (en haut)
  const botTop=sy(topH+gap), botBot=canvas.height+sy(6), bpH=botBot-botTop;
  if(bpH>0){
    pipePath(px,botTop,pw,bpH,capR,'top'); ctx.fillStyle=d.body; ctx.fill();
    const byy=botTop+capH, bH2=botBot-byy;
    if(bH2>0){ ctx.save(); ctx.beginPath(); ctx.rect(px,byy,pw,bH2); ctx.clip(); drawNailArt(px,byy,pw,bH2,d); bodySheen(px,byy,pw,bH2); ctx.restore(); }
    pipePath(px,botTop,pw,capH,capR,'top'); ctx.fillStyle=cap; ctx.fill();
    drawCapGloss(px,botTop,pw,capH,'top');
    ctx.strokeStyle=out; ctx.lineWidth=ow*0.7; ctx.beginPath(); ctx.moveTo(px,botTop+capH); ctx.lineTo(px+pw,botTop+capH); ctx.stroke();
    pipePath(px,botTop,pw,bpH,capR,'top'); ctx.strokeStyle=out; ctx.lineWidth=ow; ctx.lineJoin='round'; ctx.stroke();
  }
}

function drawScore(){
  const fs=Math.round(sx(20));
  ctx.font=`900 ${fs}px Poppins,sans-serif`; ctx.textAlign='center';
  const txt=gameScore+' / '+WIN_PIPES;
  ctx.fillStyle='rgba(92,21,38,0.55)'; ctx.fillText(txt,canvas.width/2+sx(1.5),sy(52)+sy(1.5));
  ctx.fillStyle='#FFFAFC'; ctx.fillText(txt,canvas.width/2,sy(52));
}
function spawnParticles(lx,ly){ for(let i=0;i<8;i++) particles.push({lx,ly,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*4-1.5,life:1,sz:Math.random()*3+1.5,col:Math.random()>.5?'#FECBD2':'#9B1F37'}); }
function tickParticles(dt){ particles=particles.filter(p=>p.life>0); particles.forEach(p=>{p.lx+=p.vx*dt;p.ly+=p.vy*dt;p.vy+=0.18*dt;p.life-=0.045*dt;}); }
function drawParticles(){ particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(sx(p.lx),sy(p.ly),sx(p.sz),0,Math.PI*2);ctx.fill();}); ctx.globalAlpha=1; }
function collides(){ const bx=bird.x,by=bird.y,hrx=11,hry=11; if(by-hry<0||by+hry>GROUND_Y)return true; for(const p of pipes){const px1=p.lx-5,px2=p.lx+PW+5;if(bx+hrx>px1&&bx-hrx<px2){if(by-hry<p.topH||by+hry>p.topH+p.gap)return true;}} return false; }
function getAC(){ if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume(); return audioCtx; }
function playJump(){ const ac=getAC();if(!ac)return;const osc=ac.createOscillator(),g=ac.createGain();osc.connect(g);g.connect(ac.destination);const t=ac.currentTime;osc.type='sine';osc.frequency.setValueAtTime(280,t);osc.frequency.exponentialRampToValueAtTime(560,t+0.08);g.gain.setValueAtTime(0.16,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.13);osc.start(t);osc.stop(t+0.13); }
function playPoint(){ const ac=getAC();if(!ac)return;const t=ac.currentTime;[[1047,0],[1319,0.07]].forEach(([freq,delay])=>{const osc=ac.createOscillator(),g=ac.createGain();osc.connect(g);g.connect(ac.destination);osc.type='sine';osc.frequency.value=freq;g.gain.setValueAtTime(0,t+delay);g.gain.linearRampToValueAtTime(0.2,t+delay+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.2);osc.start(t+delay);osc.stop(t+delay+0.21);}); }

function drawTapHint(){
  const pulse=0.72+0.28*Math.sin(idleF*0.12);
  const text='Tape pour voler !',fs=Math.round(sx(13));
  ctx.font=`700 ${fs}px Poppins,sans-serif`; ctx.textAlign='center';
  const cx=canvas.width/2,cy=sy(BH*0.74),tw=ctx.measureText(text).width,pad=sx(18),bh=sy(40),bx=cx-tw/2-pad,bw=tw+pad*2;
  ctx.globalAlpha=pulse;
  ctx.fillStyle='#5C1526'; ctx.fillRect(bx+sx(3),cy-bh/2+sy(3),bw,bh);
  ctx.fillStyle='#9B1F37'; ctx.fillRect(bx,cy-bh/2,bw,bh);
  ctx.strokeStyle='#5C1526'; ctx.lineWidth=sx(2); ctx.strokeRect(bx,cy-bh/2,bw,bh);
  ctx.fillStyle='#FFFAFC'; ctx.fillText(text,cx,cy+fs*0.38);
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════
function doJump(){ if(gState==='ready'){gState='playing';bird.vy=JUMP_V;playJump();return;} if(gState!=='playing')return; bird.vy=JUMP_V;playJump(); }

function openGameover(){
  show('s-go');
  document.getElementById('go-progress').textContent=gameScore+' / '+WIN_PIPES+' tuyaux passés';
}

function openVictory(){
  document.getElementById('inp-em').value='';
  document.getElementById('inp-opt').checked=false;
  document.getElementById('err-em').style.display='none';
  document.getElementById('btn-victory').disabled=true;
  show('s-victory');
}

function updateGame(dt){
  bird.vy+=GRAV*dt; bird.y+=bird.vy*dt; bird.rot=Math.max(-.52,Math.min(1.3,bird.vy*.06));
  frame+=dt;
  if(frame>=nextPipeFrame){ nextPipeFrame+=pipeInterval(); const minT=55,maxT=GROUND_Y-pGap()-55,topH=Math.random()*(maxT-minT)+minT; pipes.push({lx:BW+12,topH,gap:pGap(),scored:false,design:Math.floor(Math.random()*NAIL_DESIGNS.length)}); }
  const spd=pSpeed(); pipes.forEach(p=>p.lx-=spd*dt); pipes=pipes.filter(p=>p.lx+PW>-20);
  pipes.forEach(p=>{ if(!p.scored&&p.lx+PW<bird.x){p.scored=true;gameScore++;spawnParticles(bird.x,bird.y-12);playPoint();if(gameScore>=WIN_PIPES){gState='won';setTimeout(openVictory,450);}} });
  trailTimer+=dt; if(trailTimer>=1.8){emitTrail(bird.x,bird.y);trailTimer=0;}
  updateTrail(dt); tickParticles(dt);
  if(gState==='playing'&&collides()){gState='dead';setTimeout(openGameover,550);}
}

function drawIdleFrame(t){ ctx.clearRect(0,0,canvas.width,canvas.height); drawBg(t); const ly=BH*0.44+Math.sin(idleF*0.05)*14; emitTrail(BW*0.28,ly); updateTrail(1); drawTrail(); drawStar(BW*0.28,ly,Math.sin(idleF*0.05)*0.14); }
function drawGame(t){ ctx.clearRect(0,0,canvas.width,canvas.height); drawBg(t); pipes.forEach(p=>drawNailPipe(p.lx,p.topH,p.gap,p.design)); drawParticles(); drawTrail(); drawStar(bird.x,bird.y,bird.rot); drawScore(); }
function startGame(){ resetGame(); gState='ready'; show(null); }

function loop(ts){
  const dt=lastTime?Math.min((ts-lastTime)/(1000/60),3):1; lastTime=ts;
  const t=Date.now()*0.001;
  if(gState==='playing'){
    bgScroll=(bgScroll+pSpeed()*0.38*dt)%BG_LOOP; updateGame(dt); drawGame(t);
  } else if(gState==='won'||gState==='dead'){
    // hold frame
  } else if(gState==='ready'){
    bgScroll=(bgScroll+0.38*dt)%BG_LOOP; idleF+=dt; drawIdleFrame(t); drawTapHint();
  } else {
    bgScroll=(bgScroll+0.38*dt)%BG_LOOP; idleF+=dt; drawIdleFrame(t);
  }
  requestAnimationFrame(loop);
}

canvas.addEventListener('click',()=>doJump());
canvas.addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();doJump();}});
window.addEventListener('resize',resize);

function init(){ resize(); resetGame(); show('s-intro'); requestAnimationFrame(loop); }
document.fonts.ready.then(()=>init());
</script>
